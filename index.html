<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex89 URBAN section-10-asynchrony</title>
  <link rel="stylesheet" href="/css/styles.css" href="/css/media.css" href="/css/card.css">
  
</head>

<body>
  <noscript>
    <p>Ваш браузер не поддерживает скрипты!</p>
  </noscript>

  <header class="header">
    <h1>
      Интернет - магазин подарков "Золотая рыбка"
    </h1>

    <nav class="nav-wrapper">
      <div class="container-wide">
        <div class="row space-between align-center">
          <div class="shop_logo">
            <a href="#" class="logo">
              <img class="logoImage" src="/image/icons/goldFish.png" alt="Логотип магазина Золотая рыбка">
            </a>
          </div>
          <div class="nav">
            <ul>
              <li><a href="#">Каталог</a></li>
              <li><a href="/card.html">Поиск товара</a></li>
              <li><a href="#">Сделать заказ</a></li>
              <li><a href="#">Личный кабинет</a></li>
            </ul>
          </div>
          <div class="account-icon">
            <a href="#" class="account">Контакты
            </a>
          </div>

        </div>
      </div>
    </nav>

    <form class="productsForm">
      <label for="title">Название:</label><br>
      <input type="text" class="title" required><br>
      <label for="price">Цена:</label><br>
      <input type="number" class="price" min="0" max="10000000" required><br>
      <label for="category">Категория:</label><br>
      <select class="category">
        <option value="electronics">Электроника</option>
        <option value="jewelry">Ювелирные изделия</option>
        <option value="men’s clothing">Мужская одежда</option>
        <option value="women’s clothing">Женская одежда</option>
      </select>
      <label for="status">Описание:</label><br>
      <textarea class="description" required></textarea><br>
      <br>
      <button class="button_save" type="submit" onclick="addProduct()">Добавить товар</button>
    </form>
  </header>

  <main>
    <section class="categories-menu">
      <div class="list">
        <a href="#" class="product">
          <p class="typography">Бытовая техника</p>
          <img class="image" src="/image/pictures/appliances.jpg" alt="Бытовая техника">
        </a>
      </div>
      <div class="list">
        <a href="#" class="product">
          <p class="typography">Ювелирные изделия</p>
          <img class="image" src="/image/pictures/jewelry.jpg" alt="Ювелирные изделия">
        </a>
      </div>
      <div class="list">
        <a href="#" class="product">
          <p class="typography">Мужская одежда</p>
          <img class="image" src="/image/pictures/men clothing.jpg" alt="Мужская одежда">
        </a>
      </div>
      <div class="list">
        <a href="#" class="product">
          <p class="typography">Женская одежда</p>
          <img class="image" src="/image/pictures/women clothing.jpg" alt="Женская одежда">
        </a>
      </div>
    </section>

    <div class="products-container">
      <!--Здесь будут карточки товаров-->
    </div>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-row">
        <div class="footer-copyright">
          <div class="footer-copyright-logo">

            <div class="logo_icon">
              <a href=".././index.html" class="icon" alt="Логотип магазина Золотая рыбка">В начало
              </a>
            </div>

          </div>
          <p class="footer-copyright-terms">Copyright 2024 Золотая рыбка, Alex Kislyuk</p>
        </div>
        <div class="footer-nav-wrapper">
          <div class="footer-nav">

            <div class="icon-cell">
              <a href="third_page.html">
                <img src="/image/icons/letter.png" alt="наши адреса">
              </a>
            </div>
            <div class="icon-cell">
              <a href="third_page.html">
                <img src="/image/icons/email.png" alt="электронная почта">
              </a>
            </div>
            <div class="icon-cell">
              <a href="third_page.html">
                <img src="/image/icons/phone.png" alt="наши телефоны">
              </a>

            </div>

          </div>
        </div>
      </div>
  </footer>
  <script src="script.js"></script>
</body>

</html>
