<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/css/cart.css">
</head>
<body>
  <h1>
    Интернет - магазин подарков "Золотая рыбка"
</h1>
<h2>
Поиск товара
</h2>
  <form class="product-card">
    <label for="product-id">Идентификатор товара:</label><br>
    <input type="number" id="product-id" required><br>
    <label for="title">Название товара:</label><br>
    <input type="text" id="title" required><br>
    <label for="price">Стоимость товара:</label><br>
    <input type="number" id="price" required><br>
    <label for="category">Категория товара:</label><br>
    <input type="text" id="category" required><br>
    <label for="discription">Описание товара:</label><br>
    <input type="text" id="discription" required><br>
    <label for="image">Фото товара:</label><br>
    <input type="image" id="image" required><br>
  </form>
  
  <div class="logo_icon">На главную страницу
    <a href="/index.html" class="icon">
      <img class="logoImage" src="/image/icons/goldFishico.jpg" alt="Логотип магазина Золотая рыбка">
    </a>

  </div>
</body>
</html>
